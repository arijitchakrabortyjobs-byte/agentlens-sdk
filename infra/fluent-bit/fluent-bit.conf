[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# Watch AgentLens NDJSON audit log output directory
[INPUT]
    Name              tail
    Path              /audit-logs/**/*.ndjson
    Parser            agentlens_ndjson
    Tag               agentlens.audit
    Refresh_Interval  5
    Read_from_Head    On
    DB                /tmp/fluentbit.db

# Enrich with source metadata
[FILTER]
    Name   record_modifier
    Match  agentlens.audit
    Record source agentlens-local
    Record env    dev

# Ship to OpenSearch (index per day — mirrors RBI retention policy)
[OUTPUT]
    Name            opensearch
    Match           agentlens.audit
    Host            opensearch
    Port            9200
    Index           agentlens-audit-%Y.%m.%d
    Type            _doc
    Logstash_Format Off
    Replace_Dots    On
    tls             Off
