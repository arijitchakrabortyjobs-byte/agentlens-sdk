receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Traces → Jaeger (for visual debugging)
  # Jaeger's native OTLP ingestion port (COLLECTOR_OTLP_ENABLED=true), not
  # the legacy Jaeger-protobuf collector port (14250) which doesn't speak OTLP.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics → Prometheus (for Grafana dashboards)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: agentlens

  # Debug to stdout during dev
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
