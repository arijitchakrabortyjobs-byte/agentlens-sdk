global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # AgentLens FastAPI /metrics endpoint (Phase 1)
  - job_name: agentlens-api
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  # OTEL Collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # OTEL Collector AgentLens exported metrics
  - job_name: agentlens-spans
    static_configs:
      - targets: ["otel-collector:8889"]

  # Postgres exporter (add postgres-exporter service if needed)
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # RabbitMQ
  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
